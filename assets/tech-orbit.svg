<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-labelledby="title desc">
  <title id="title">Dzikri's technology orbit</title>
  <desc id="desc">Next.js, WordPress, n8n, OpenAI, and PostgreSQL orbit around Dzikri's build and ship workflow.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1117"/>
      <stop offset=".5" stop-color="#15102A"/>
      <stop offset="1" stop-color="#071B25"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    .orbit { transform-origin:600px 180px; animation:spin 26s linear infinite; }
    .ring { transform-origin: 600px 180px; animation: pulse 3.2s ease-in-out infinite; }
    .signal { stroke-dasharray: 8 12; animation: signal 5s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity:.35; transform:scale(.97); } 50% { opacity:.8; transform:scale(1.03); } }
    @keyframes signal { to { stroke-dashoffset:-80; } }
    @media (prefers-reduced-motion: reduce) { .orbit,.ring,.signal { animation:none; } }
  </style>

  <rect width="1200" height="400" rx="18" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="398" rx="17" fill="none" stroke="#30363D" stroke-width="2"/>
  <circle cx="600" cy="180" r="125" fill="none" stroke="#30363D" stroke-width="2"/>
  <circle class="signal" cx="600" cy="180" r="125" fill="none" stroke="#22D3EE" stroke-width="2" opacity=".55"/>
  <circle class="ring" cx="600" cy="180" r="92" fill="none" stroke="#7C3AED" stroke-width="3" filter="url(#glow)"/>
  <circle cx="600" cy="180" r="76" fill="url(#core)"/>

  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="600" y="172" fill="#FFFFFF" font-size="25" font-weight="800" letter-spacing="2">DZIKRI</text>
    <text x="600" y="202" fill="#E0F2FE" font-size="13" font-weight="700" letter-spacing="3">BUILD &amp; SHIP</text>
  </g>

  <!-- Next.js -->
  <g transform="rotate(0 600 180)"><g class="orbit"><g transform="translate(600 55)">
    <circle r="41" fill="#111827" stroke="#FFFFFF" stroke-width="2"/>
    <path transform="translate(-20 -20) scale(1.67)" fill="#FFFFFF" d="M18.665 21.978C16.758 23.255 14.465 24 12 24 5.377 24 0 18.623 0 12S5.377 0 12 0s12 5.377 12 12c0 3.583-1.574 6.801-4.067 9.001L9.219 7.2H7.2v9.596h1.615V9.251l9.85 12.727Zm-3.332-8.533 1.6 2.061V7.2h-1.6v6.245Z"/>
  </g></g></g>

