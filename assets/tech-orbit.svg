  <!-- PostgreSQL -->
  <g transform="rotate(288 600 180)"><g class="orbit"><g transform="translate(600 55)">
    <circle r="41" fill="#102A56" stroke="#4169E1" stroke-width="2"/>
    <ellipse cx="0" cy="-12" rx="20" ry="8" fill="#93C5FD"/>
    <path d="M-20-12v25c0 4 9 8 20 8s20-4 20-8v-25c0 5-9 9-20 9s-20-4-20-9Z" fill="#4169E1"/>
    <path d="M-20 0c0 5 9 9 20 9s20-4 20-9" fill="none" stroke="#BFDBFE" stroke-width="3"/>
    <text x="0" y="17" text-anchor="middle" fill="#FFFFFF" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="800">PG</text>
  </g></g></g>

  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-size="14" font-weight="700">
    <text x="240" y="365" fill="#FFFFFF">NEXT.JS</text>
    <text x="420" y="365" fill="#7DD3FC">WORDPRESS</text>
    <text x="600" y="365" fill="#EA4B71">N8N</text>
    <text x="780" y="365" fill="#34D399">OPENAI</text>
    <text x="960" y="365" fill="#93C5FD">POSTGRESQL</text>
  </g>
